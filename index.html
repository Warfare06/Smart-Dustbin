<!DOCTYPE html>
<html>
<head>
    <title>Smart Street Dustbin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Street Waste Monitoring</h1>

<div class="bins">
    <button onclick="selectBin('bin1')">Bin 1</button>
    <button onclick="selectBin('bin2')">Bin 2</button>
    <button onclick="selectBin('bin3')">Bin 3</button>
    <button onclick="selectBin('bin4')">Bin 4</button>
</div>

<div class="bin-model">
    <div class="fill" id="fillLevel"></div>
</div>

<div class="info">
    <p>Level: <span id="level">0</span>%</p>
    <p>Waste Type: <span id="waste_type">Dry</span></p>
    <p>Status: <span id="status">Not Full</span></p>
    <p>Moisture: <span id="moisture">0</span></p>
</div>
<div class="bin-container">
    <div class="lid" id="lid"></div>
    <div class="bin-body">
        <div class="fill" id="fillLevel"></div>
    </div>
</div>

<br>

<button onclick="openBin()">Open Lid</button>
<button onclick="closeBin()">Close Lid</button>
<button onclick="sendAlert()">Send Alert</button>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>

</body>
</html>
