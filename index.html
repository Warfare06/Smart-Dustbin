<!DOCTYPE html>
<html>
<head>
    <title>Smart Street Waste Monitoring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Street Waste Monitoring</h1>

<!-- Street Buttons -->
<div class="streets">
    <button onclick="selectStreet('street1')">Street 1</button>
    <button onclick="selectStreet('street2')">Street 2</button>
    <button onclick="selectStreet('street3')">Street 3</button>
    <button onclick="selectStreet('street4')">Street 4</button>
</div>

<h3 id="streetTitle">Street 1 Bins</h3>

<!-- Street Bins -->
<div class="street-bins">
    <div class="small-bin" onclick="selectBin('bin1')"></div>
    <div class="small-bin" onclick="selectBin('bin2')"></div>
    <div class="small-bin" onclick="selectBin('bin3')"></div>
    <div class="small-bin" onclick="selectBin('bin4')"></div>
</div>

<!-- Bin Info -->
<div class="info">
    <p>Level: <span id="level">0</span>%</p>
    <p>Waste Type: <span id="waste_type">Dry</span></p>
    <p>Status: <span id="status">Not Full</span></p>
    <p>Moisture: <span id="moisture">0</span></p>
</div>

<!-- Bin Model -->
<div class="bin-container">
    <div class="lid" id="lid"></div>
    <div class="bin-body">
        <div class="fill" id="fillLevel"></div>
    </div>
</div>

<br>

<button onclick="openBin()">Open Lid</button>
<button onclick="closeBin()">Close Lid</button>
<button onclick="sendAlert()">Send Alert</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>

</body>
</html>
