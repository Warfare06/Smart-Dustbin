<!DOCTYPE html>
<html>
<head>
    <title>Smart Dustbin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Dustbin Dashboard</h1>

<div class="card">
    <h2>Waste Level</h2>
    <p id="level">0%</p>
</div>

<div class="card">
    <h2>Waste Type</h2>
    <p id="waste_type">Dry</p>
</div>

<div class="card">
    <h2>Bin Status</h2>
    <p id="status">Not Full</p>
</div>

<div class="card">
    <h2>Lid Status</h2>
    <p id="lid_status">Closed</p>
</div>

<button onclick="openLid()">Open Lid</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>

</body>
</html>
