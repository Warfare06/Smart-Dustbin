<!DOCTYPE html>
<html>
<head>
    <title>Smart Street Waste Monitoring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Street Waste Monitoring</h1>

<div class="streets">
    <button onclick="selectStreet('street1')">Street 1</button>
    <button onclick="selectStreet('street2')">Street 2</button>
    <button onclick="selectStreet('street3')">Street 3</button>
    <button onclick="selectStreet('street4')">Street 4</button>
</div>

<h2 id="streetTitle">Street 1</h2>

<div class="bins-container">

    <div class="bin-card">
        <div class="lid"></div>
        <div class="bin"><div class="fill" id="fill1"></div></div>
        <p>Level: <span id="level1">0</span>%</p>
        <p>Type: <span id="type1">dry</span></p>
        <p>Status: <span id="status1">not_full</span></p>
    </div>

    <div class="bin-card">
        <div class="lid"></div>
        <div class="bin"><div class="fill" id="fill2"></div></div>
        <p>Level: <span id="level2">0</span>%</p>
        <p>Type: <span id="type2">dry</span></p>
        <p>Status: <span id="status2">not_full</span></p>
    </div>

    <div class="bin-card">
        <div class="lid"></div>
        <div class="bin"><div class="fill" id="fill3"></div></div>
        <p>Level: <span id="level3">0</span>%</p>
        <p>Type: <span id="type3">dry</span></p>
        <p>Status: <span id="status3">not_full</span></p>
    </div>

    <div class="bin-card">
        <div class="lid"></div>
        <div class="bin"><div class="fill" id="fill4"></div></div>
        <p>Level: <span id="level4">0</span>%</p>
        <p>Type: <span id="type4">dry</span></p>
        <p>Status: <span id="status4">not_full</span></p>
    </div>

</div>

<h2>Daily Waste Graph</h2>
<canvas id="wasteChart" width="500" height="200"></canvas>

<h2>Garbage Truck Route</h2>
<div id="map" style="width:90%;height:400px;margin:auto;"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>

</body>
</html>
